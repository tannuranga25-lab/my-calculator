<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caLculatorbyTannu</title>
    <link href="utlis.css" rel="stylesheet" type="text/css"/>
    <link href="Style.css" rel="stylesheet" type="text/css">
</head>


<body>

    <h1 class="text-center">Welcome to Calculate me!</h1>

    <div class="container flex flex-col items-center bg-red mx-auto m-w-20">
        <div class="row">
            <input class="input" type="text"/>

        </div>

<div class="boxbox">

    
        <div class="row">
            <button class="button">Sin</button>
            <button class="button">Cos</button>
            <button class="button">Tan</button>
            <button class="button">EXP</button>

        </div>

        <div class="row">
            <button class="button">Log</button>
            <button class="button">In</button>
            <button class="button">x!</button>
            <button class="button">Ans</button>
            
        </div>

        <div class="row">
            <button class="button">Rad</button>
            <button class="button">e</button>
            <button class="button">√</button>
            <button class="button">π</button>
            
        </div>


        <div class="row">
            <button class="button">C</button>
            <button class="button">%</button>
            <button class="button">M+</button>
            <button class="button">M-</button>
        </div>
        <div class="row">
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button">*</button> </div>

        <div class="row">
            <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button">/</button>
        </div>

        <div class="row">
            <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button">+</button>
        </div>

        <div class="row">
            <button class="button">0</button>
            <button class="button">.</button>
            <button class="button">=</button>
            <button class="button">-</button>
        </div>


        
    </div>

    
        </div>





        






<script src="script.js"></script>
    
</body>
</html>
